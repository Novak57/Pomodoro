# Deploy static build to GitHub Pages (project site: /REPO_NAME/).
#
# After pushing: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
# Site URL: https://<username>.github.io/<repository>/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and build
        env:
          BASE_HREF: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build -- --base-href "$BASE_HREF"
          cp dist/pomodoro/browser/index.html dist/pomodoro/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pomodoro/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
