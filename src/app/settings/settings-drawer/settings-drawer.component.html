<div class="settings-layer">
  <div
    class="settings-backdrop"
    (click)="timer.closeSettings()"
    role="presentation"
    aria-hidden="true"
  ></div>
  <div
    class="settings-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="settings-modal-title"
  >
    <div class="settings-modal-top">
      <h2 class="settings-modal-title" id="settings-modal-title">Settings</h2>
      <button
        type="button"
        class="icon-btn modal-close"
        (click)="$event.preventDefault(); $event.stopPropagation(); timer.closeSettings()"
        aria-label="Close settings"
      >
        <span class="material-symbols-outlined ms-icon" aria-hidden="true">close</span>
      </button>
    </div>
    <div class="settings-modal-body">
      <app-duration-settings />
      <app-timer-behavior-settings />
      <app-alert-settings />
    </div>
    <div class="settings-modal-footer">
      <button type="button" class="save-close-btn" (click)="persistence.saveAndClose()">
        Save &amp; close
      </button>
    </div>
  </div>
</div>
