<section class="settings timer-behavior" aria-label="Timer behavior">
  <h3 class="settings-title">Timer</h3>
  <p class="behavior-lead">
    Start the next phase automatically when the current one ends (you can still pause or skip).
  </p>
  <div class="checkbox-block">
    <mat-checkbox
      [checked]="timer.autoStartBreaks()"
      (change)="timer.onAutoStartBreaksChange($event.checked)"
    >
      Auto-start breaks after a focus block ends
    </mat-checkbox>
  </div>
  <div class="checkbox-block">
    <mat-checkbox
      [checked]="timer.autoStartFocus()"
      (change)="timer.onAutoStartFocusChange($event.checked)"
    >
      Auto-start focus after a break ends
    </mat-checkbox>
  </div>
</section>
