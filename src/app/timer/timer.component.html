<div class="timer-stack">
  <div
    class="timer-card"
    [attr.data-phase]="timer.phase()"
    [class.running]="timer.isRunning()"
  >
    <div class="timer-card-top">
      <p class="phase-badge">
        @if (timer.phase() === 'work' && tasks.currentTask(); as ct) {
          <span class="phase-line">
            <span class="phase-label-text">{{ timer.phaseLabel() }}</span>
            <span class="phase-sep" aria-hidden="true"> — </span>
            <span class="current-task-title" [attr.title]="ct.title">{{ ct.title }}</span>
          </span>
        } @else {
          {{ timer.phaseLabel() }}
        }
      </p>
      <button
        mat-icon-button
        type="button"
        class="timer-settings-btn"
        (click)="timer.openSettings()"
        aria-label="Open settings"
        matTooltip="Settings"
      >
        <span class="material-symbols-outlined ms-icon" aria-hidden="true">settings</span>
      </button>
    </div>
    <div class="ring-wrap" aria-hidden="true">
      <svg class="ring" viewBox="0 0 120 120">
        <circle class="ring-bg" cx="60" cy="60" r="54" />
        <circle
          class="ring-fill"
          cx="60"
          cy="60"
          r="54"
          [attr.stroke-dasharray]="ringCircumference"
          [style.stroke-dashoffset]="
            ringCircumference - ringCircumference * timer.progress()
          "
        />
      </svg>
      <div class="time-display">{{ timer.formattedTime() }}</div>
    </div>

    <div class="controls" role="group" aria-label="Timer controls">
      @if (!timer.isRunning()) {
        <button
          mat-flat-button
          type="button"
          class="pomodoro-mat-pill timer-primary-mat"
          (click)="timer.start()"
        >
          Start
        </button>
      } @else {
        <button
          mat-flat-button
          type="button"
          class="pomodoro-mat-pill timer-primary-mat"
          (click)="timer.pause()"
        >
          Pause
        </button>
      }
      <button
        mat-stroked-button
        type="button"
        class="pomodoro-mat-pill"
        (click)="timer.resetPhase()"
      >
        Reset
      </button>
      <button
        mat-stroked-button
        type="button"
        class="pomodoro-mat-pill"
        (click)="timer.skipPhase()"
      >
        Skip
      </button>
    </div>
  </div>

  <app-task-list />
</div>
